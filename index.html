<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal del Cliente — ReelSupra</title>
  <meta name="description" content="Portal del cliente ReelSupra: estado de proyectos, roadmap y recursos." />

  <!-- Tipografía — fuentes disponibles para el selector del Theme Builder -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Íconos -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>

  <!-- Favicon dinámico: RS.applyBranding() lo actualiza si client.faviconUrl existe -->
  <link rel="icon" id="favicon" href="data:," />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div id="portalLoading" class="portal-loading" aria-live="polite">
    <span class="portal-loading__spinner"></span>
    <span>Cargando portal…</span>
  </div>

  <div id="announcement" class="announcement"></div>

  <header id="topbar" class="topbar">
    <div class="topbar__inner">
      <div class="brand">ReelSupra</div>
    </div>
  </header>

  <main class="shell">
    <div id="loginGate" class="dashboard-gate" style="display:none;">
      <p>Iniciá sesión para ver tu portal.</p>
      <button class="btn btn--primary" id="loginGateBtn">Iniciar sesión</button>
    </div>

    <div id="portalApp" style="display:none;">
      <section id="hero" class="hero"></section>

      <section id="newsTickerSection" class="section" style="display:none;">
        <div class="section__head">
          <span class="section__title">Últimas novedades</span>
        </div>
        <div id="newsTicker"></div>
      </section>

      <section class="section">
        <div class="section__head">
          <span class="section__title">Tus proyectos</span>
        </div>
        <div id="projectGrid" class="project-grid stagger"></div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="shell footer__inner">
      <span>ReelSupra</span>
      <span>Portal del cliente</span>
    </div>
  </footer>

  <!-- Seed/fallback si Supabase no responde — ver js/store.supabase.js -->
  <script src="js/data.js"></script>
  <!-- Cliente de Supabase (fuente de verdad real desde el 2026-07-12) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/store.supabase.js"></script>
  <script src="js/render.js"></script>
  <script src="js/admin.js"></script>
  <script>
    function removeLoadingOverlay() {
      const loadingEl = document.getElementById("portalLoading");
      if (loadingEl) loadingEl.remove();
    }

    // Puerta única (Fase 2, Parte F): sin sesión y sin ?client= en la
    // URL, no hay ningún "cliente demo" por default — se pide login.
    function showLoginGate() {
      removeLoadingOverlay();
      document.getElementById("loginGate").style.display = "flex";
      document.getElementById("loginGateBtn").addEventListener("click", () => {
        RSAdmin.tryActivateAdmin().then((isAdmin) => {
          // Login de cliente: el propio modal ya redirige a index.html
          // (sin slug) — acá solo hace falta resolver el caso admin.
          if (isAdmin) window.location.replace("dashboard.html");
        });
      });
    }

    function bootPortal(slug) {
      RSStore.hydrate(RSStore.load(slug))
        .then(() => {
          RS.applyTheme();
          RS.applyBranding();
          return RSAdmin.detectAdminMode(); // async: puede esperar un login real
        })
        .then(() => {
          document.getElementById("portalApp").style.display = "block";
          RS.renderTopbar({ showBack: false });
          RS.renderAnnouncement();
          RS.renderHero();
          RS.renderNewsTicker();
          RS.renderProjectGrid();
          RS.hydrateIcons();
          RSAdmin.init();
          removeLoadingOverlay();
        });
    }

    function boot() {
      RSStore.resolveClientAccess().then((access) => {
        if (access.role === "admin") { window.location.replace("dashboard.html"); return; }
        if (!access.slug) { showLoginGate(); return; }
        bootPortal(access.slug);
      });
    }
    document.addEventListener("DOMContentLoaded", boot);
  </script>
</body>
</html>
